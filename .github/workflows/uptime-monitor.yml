name: Website Uptime Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes
  workflow_dispatch:          # Allows manual runs from GitHub Actions tab

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create state file if missing
        run: |
          if [ ! -f monitor_state.json ]; then
            echo '{}' > monitor_state.json
          fi

      - name: Run Monitor Script
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor.py

      - name: Save updated state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add monitor_state.json
          git diff --cached --quiet || git commit -m "Update monitor state"
          git push
